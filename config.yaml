server:
  # Port the HTTP server listens on.
  port: 8043
  # Maximum number of concurrent requests; further requests get 429.
  rateLimit: 60

log:
  # Minimum log level: debug, info, warn, error.
  level: "info"

cache:
  # How long successful results are cached, in seconds.
  expiration: 3600
  # How long not-found/denied results are cached, in seconds.
  # Set to a negative value to disable negative caching.
  negativeExpiration: 60
  # Fail at startup when Redis is unavailable instead of falling back to the
  # in-memory cache.
  requireRedis: false
  # Maximum number of entries in the in-memory fallback cache.
  memoryMaxSize: 10000
  # Interval for evicting expired in-memory entries, in seconds.
  memoryCleanInterval: 300

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  # Enable TLS when Redis is reached over an untrusted network.
  tls: false
  # Skip server certificate verification (not recommended).
  tlsSkipVerify: false

proxy:
  # HTTP proxy for RDAP queries to the TLDs listed in suffixes.
  # Leave server empty to disable proxying.
  server: ""
  username: ""
  password: ""
  # TLDs queried through the proxy; the special value "all" proxies every TLD.
  suffixes: []

bootstrap:
  # How often to refresh RDAP server lists from IANA, in seconds.
  # 0 disables refreshing.
  interval: 86400

auth:
  # API keys accepted for authentication. Empty (the default) leaves the
  # service open; one or more keys protect every endpoint except /health and
  # /ready. Clients send a key as "Authorization: Bearer <key>" or
  # "X-API-Key: <key>". Can also be set via WHOIS_AUTH_KEYS (comma-separated).
  # Entries are bare strings, or objects with a display name (shows up in
  # logs and metrics) and an optional per-key rate limit in requests/minute:
  # keys:
  #   - "your-secret-key"
  #   - key: "another-secret-key"
  #     name: "ci"
  #     rateLimit: 120
  keys: []

batch:
  # POST /batch answers up to maxItems mixed domain/IP/ASN queries in one
  # request (also exposed as the MCP whois_batch_lookup tool). Off by
  # default; best enabled together with auth.keys, since an open instance
  # offering batch queries multiplies how fast it can be abused against
  # upstream registries. With a per-key rate limit, a batch of N queries
  # costs N tokens.
  enabled: false
  maxItems: 10

mcp:
  # DNS-rebinding protection for the /mcp endpoint: rejects requests whose
  # Host header is not localhost. Keep false behind a reverse proxy; set true
  # when the server is reached directly on localhost.
  localhostProtection: false
